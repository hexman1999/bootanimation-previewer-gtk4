name: Build Packages

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      build_deb:
        description: Build .deb package
        type: boolean
        default: true
      build_rpm:
        description: Build .rpm package
        type: boolean
        default: true
      build_appimage:
        description: Build AppImage
        type: boolean
        default: true
      release_type:
        description: What to do with the build
        type: choice
        options:
          - Keep only in Actions
          - Create Release
          - Create Pre-release
        default: "Keep only in Actions"

env:
  APP: bootanimation-previewer

jobs:
  deb:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.build_deb)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install fpm
        run: sudo gem install fpm
      - name: Build .deb
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [ -n "$VER" ] || VER="1.0.0"
          fpm -s dir -t deb \
            -n $APP -v "$VER" \
            --description "Preview and export Android bootanimation.zip files" \
            --license "GPL-3.0" \
            --url "https://github.com/hexman1999/bootanimation-previewer-gtk4" \
            --depends python3-gi \
            --depends python3-gi-cairo \
            --depends gir1.2-gtk-4.0 \
            --depends gir1.2-adw-1 \
            --depends python3-opencv \
            --depends python3-numpy \
            --depends ffmpeg \
            previewer.py=/usr/bin/$APP \
            Resources/bootanimation-previewer.svg=/usr/share/icons/hicolor/scalable/apps/$APP.svg
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}-deb
          path: "*.deb"
      - name: Upload to release (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.release_type != 'Keep only in Actions'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: ${{ inputs.release_type == 'Create Pre-release' }}
          files: "*.deb"

  rpm:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.build_rpm)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install fpm
        run: sudo gem install fpm
      - name: Build .rpm
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [ -n "$VER" ] || VER="1.0.0"
          fpm -s dir -t rpm \
            -n $APP -v "$VER" \
            --description "Preview and export Android bootanimation.zip files" \
            --license "GPL-3.0" \
            --url "https://github.com/hexman1999/bootanimation-previewer-gtk4" \
            --depends python3-gobject \
            --depends python3-cairo \
            --depends gtk4 \
            --depends libadwaita \
            --depends opencv \
            --depends python3-numpy \
            --depends ffmpeg \
            previewer.py=/usr/bin/$APP \
            Resources/bootanimation-previewer.svg=/usr/share/icons/hicolor/scalable/apps/$APP.svg
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}-rpm
          path: "*.rpm"
      - name: Upload to release (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.release_type != 'Keep only in Actions'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: ${{ inputs.release_type == 'Create Pre-release' }}
          files: "*.rpm"

  appimage:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.build_appimage)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-venv \
            python3-gi python3-gi-cairo python3-cairo \
            libgtk-4-dev libadwaita-1-dev libgraphene-1.0-dev \
            file wget

      - name: Build bundled Python venv
        run: |
          set -eux
          APPDIR="${{ runner.temp }}/AppDir"
          VENV="$APPDIR/usr/lib/python-venv"
          PYTHON_LIB="lib/python3.12/site-packages"

          mkdir -p "$APPDIR/usr/lib" "$APPDIR/usr/bin" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/scalable/apps" \
                   "$APPDIR/usr/lib/girepository-1.0"

          # Create a venv inside the AppDir (bundles Python interpreter & stdlib)
          # --copies makes real file copies (not symlinks) so Python works on other systems
          python3 -m venv --copies "$VENV"

          # Install wheel-only deps into the venv
          "$VENV/bin/python3" -m pip install --no-user \
            opencv-python numpy pycairo 2>&1

          # PyGObject cannot be pip-installed (needs girepository-2.0.pc at compile time),
          # so copy it from the system into the venv
          src=$(python3 -c 'import gi, os; print(os.path.dirname(gi.__file__))')
          cp -rL "$src" "$VENV/$PYTHON_LIB/"
          echo "Copied gi:"
          ls -la "$VENV/$PYTHON_LIB/gi/"

          # Force reinstall pycairo to guarantee _cairo C extension lands in venv
          "$VENV/bin/python3" -m pip install --force-reinstall --no-deps pycairo 2>&1

          echo "=== cairo/ in venv ==="
          ls -la "$VENV/$PYTHON_LIB/cairo/"

          # Verify _cairo loads from within the venv
          "$VENV/bin/python3" -c "import cairo._cairo; print('_cairo OK:', cairo._cairo.__file__)"

      - name: Verify AppDir — all imports work
        run: |
          set -eux
          APPDIR="${{ runner.temp }}/AppDir"
          VENV_PYTHON="$APPDIR/usr/lib/python-venv/bin/python3"
          export GI_TYPELIB_PATH="/usr/lib/x86_64-linux-gnu/girepository-1.0"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib"

          export APPDIR
          cat > /tmp/verify.py << 'PYEOF'
          import gi, cairo, cv2, numpy, os
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          from gi.repository import Gtk, Adw
          for mod in (gi, cairo):
              f = mod.__file__ or mod.__path__[0]
              assert os.environ['APPDIR'] in f, \
                  '{} loaded from {} -- not AppDir!'.format(mod.__name__, f)
              print('{}: {}'.format(mod.__name__, f))
          print('AppDir: all imports OK')
          PYEOF
          "$VENV_PYTHON" /tmp/verify.py

      - name: Build AppDir — copy app files
        run: |
          set -eux
          APPDIR="${{ runner.temp }}/AppDir"
          VENV="$APPDIR/usr/lib/python-venv"

          cp previewer.py "$APPDIR/usr/bin/$APP"
          chmod 755 "$APPDIR/usr/bin/$APP"
          cp Resources/bootanimation-previewer.svg \
             "$APPDIR/usr/share/icons/hicolor/scalable/apps/$APP.svg"

          cp /usr/lib/x86_64-linux-gnu/girepository-1.0/*.typelib \
             "$APPDIR/usr/lib/girepository-1.0/"

          # Ensure the venv Python can find the bundled typelibs
          echo "$APPDIR/usr/lib/girepository-1.0" > "$VENV/lib/python3.12/site-packages/gi_typelib_path.pth" 2>/dev/null || true

      - name: Bundle shared libraries
        run: |
          set -eux
          APPDIR="${{ runner.temp }}/AppDir"
          BUNDLE="$APPDIR/usr/lib"

          exclude='libc\.so|libm\.so|libpthread\.so|libdl\.so|librt\.so|libutil\.so'
          exclude="$exclude|libresolv\.so|libnss_|ld-linux|ld-\.so|libcrypt\.so"
          exclude="$exclude|libanl\.so|libBrokenLocale|libcidn|libthread_db"
          exclude="$exclude|libstdc\+\+\.so|libgcc_s\.so"

          find "$APPDIR" -type f \( -name "*.so*" -o -executable \) | while read -r f; do
            ldd "$f" 2>/dev/null | sed -n 's/.*=> \([^ ]*\) .*/\1/p' || true
          done | sort -u | grep -Ev "$exclude" | while read -r lib; do
            [ -f "$lib" ] && cp -nL "$lib" "$BUNDLE/" 2>/dev/null || true
          done

      - name: Create AppRun
        run: |
          APPDIR="${{ runner.temp }}/AppDir"
          cat > "$APPDIR/AppRun" << 'RUNEOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export GI_TYPELIB_PATH="$HERE/usr/lib/girepository-1.0"
          export LD_LIBRARY_PATH="$HERE/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          PYTHON="$HERE/usr/lib/python-venv/bin/python3"
          if [ ! -x "$PYTHON" ]; then
              PYTHON="python3"
          fi
          exec "$PYTHON" "$HERE/usr/bin/bootanimation-previewer" "$@"
          RUNEOF
          chmod +x "$APPDIR/AppRun"

      - name: Create desktop entry and metadata
        run: |
          APPDIR="${{ runner.temp }}/AppDir"

          cat > "$APPDIR/usr/share/applications/org.bootanimation_previewer.desktop" << EOF
          [Desktop Entry]
          Name=Boot Animation Previewer
          Comment=Preview and export Android bootanimation.zip files
          Exec=bootanimation-previewer
          Icon=bootanimation-previewer
          Terminal=false
          Type=Application
          Categories=Graphics;
          EOF

          mkdir -p "$APPDIR/usr/share/metainfo"
          cat > "$APPDIR/usr/share/metainfo/org.bootanimation_previewer.appdata.xml" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>org.bootanimation_previewer</id>
            <name>Boot Animation Previewer</name>
            <summary>Preview and export Android bootanimation.zip files</summary>
            <metadata_license>CC0-1.0</metadata_license>
            <project_license>GPL-3.0</project_license>
            <description>
              <p>A GTK4/Libadwaita application for previewing and exporting Android bootanimation.zip files.</p>
            </description>
            <url type="homepage">https://github.com/hexman1999/bootanimation-previewer-gtk4</url>
            <screenshots>
              <screenshot type="default">
                <image>https://raw.githubusercontent.com/hexman1999/bootanimation-previewer-gtk4/main/Resources/bootanimation-previewer.svg</image>
              </screenshot>
            </screenshots>
            <launchable type="desktop-id">org.bootanimation_previewer.desktop</launchable>
          </component>
          EOF

          ln -sf usr/share/applications/org.bootanimation_previewer.desktop "$APPDIR/"
          ln -sf usr/share/icons/hicolor/scalable/apps/bootanimation-previewer.svg \
             "$APPDIR/"

      - name: Verify AppDir — test with bundled libraries
        run: |
          set -eux
          APPDIR="${{ runner.temp }}/AppDir"
          VENV_PYTHON="$APPDIR/usr/lib/python-venv/bin/python3"
          export GI_TYPELIB_PATH="$APPDIR/usr/lib/girepository-1.0"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib"

          export APPDIR
          cat > /tmp/verify2.py << 'PYEOF'
          import gi, cairo, os
          gi.require_version('Gtk', '4.0')
          gi.require_version('Adw', '1')
          from gi.repository import Gtk, Adw
          for mod in (gi, cairo):
              f = mod.__file__ or mod.__path__[0]
              assert os.environ['APPDIR'] in f, \
                  '{} loaded from {} -- not AppDir!'.format(mod.__name__, f)
              print('{}: {}'.format(mod.__name__, f))
          print('AppDir bundled: all imports OK')
          PYEOF
          "$VENV_PYTHON" /tmp/verify2.py

      - name: Debug — list cairo/ contents before packaging
        run: |
          set -x
          APPDIR="${{ runner.temp }}/AppDir"
          VENV_C="$APPDIR/usr/lib/python-venv/lib/python3.12/site-packages/cairo"
          echo "=== cairo/ in venv ==="
          find "$VENV_C" -type f 2>/dev/null || echo "(not at old path)"
          echo "=== cairo/ anywhere in AppDir ==="
          find "$APPDIR" -path "*/cairo/_cairo*" -type f 2>/dev/null || echo "(none found)"
          echo "=== test import cairo._cairo via venv ==="
          "$APPDIR/usr/lib/python-venv/bin/python3" -c "import cairo._cairo; print('_cairo OK:', cairo._cairo.__file__)"

      - name: Package AppImage
        if: success()
        run: |
          cd /tmp
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun "${{ runner.temp }}/AppDir" \
            "${{ github.workspace }}/${{ env.APP }}-x86_64.AppImage"

      - name: Debug — verify _cairo.so inside the AppImage
        if: success()
        run: |
          set -eux
          cd /tmp
          chmod +x "${{ github.workspace }}/${{ env.APP }}-x86_64.AppImage"
          "${{ github.workspace }}/${{ env.APP }}-x86_64.AppImage" --appimage-extract 2>&1
          echo "=== cairo/ inside AppImage ==="
          find squashfs-root -path "*/cairo/_cairo*" -type f
          echo "=== all files in cairo/ ==="
          find squashfs-root -path "*/cairo/" -type d -exec ls -la {} \;
          echo "=== test import via venv Python from AppImage ==="
          squashfs-root/usr/lib/python-venv/bin/python3 -c \
            "import cairo._cairo; print('OK _cairo:', cairo._cairo.__file__)"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ env.APP }}-appimage
          path: "*.AppImage"

      - name: Upload to release (manual)
        if: success() && github.event_name == 'workflow_dispatch' && inputs.release_type != 'Keep only in Actions'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: ${{ inputs.release_type == 'Create Pre-release' }}
          files: "*.AppImage"

  upload-release:
    if: github.event_name == 'release'
    needs: [deb, rpm, appimage]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.deb
            artifacts/*/*.rpm
            artifacts/*/*.AppImage
