<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <filter id="play-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.25" />
    </filter>

    <linearGradient id="outer-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F5" />
      <stop offset="100%" stop-color="#E1E4HandleE6" />
    </linearGradient>

    <linearGradient id="film-border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C3135" />
      <stop offset="100%" stop-color="#1A1D20" />
    </linearGradient>

    <clipPath id="screen-clip">
      <rect x="145" y="115" width="210" height="270" rx="10" ry="10" />
    </clipPath>
  </defs>

  <rect x="40" y="40" width="420" height="420" rx="90" ry="90" fill="url(#outer-base)" filter="url(#drop-shadow)" />
  
  <rect x="41" y="41" width="418" height="418" rx="89" ry="89" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.8" />

  <rect x="105" y="85" width="290" height="330" rx="35" ry="35" fill="url(#film-border-grad)" />

  <g fill="#D1D5D8">
    <rect x="117" y="120" width="16" height="16" rx="3" />
    <rect x="117" y="190" width="16" height="16" rx="3" />
    <rect x="117" y="260" width="16" height="16" rx="3" />
    <rect x="117" y="330" width="16" height="16" rx="3" />
  </g>

  <g fill="#D1D5D8">
    <rect x="367" y="120" width="16" height="16" rx="3" />
    <rect x="367" y="190" width="16" height="16" rx="3" />
    <rect x="367" y="260" width="16" height="16" rx="3" />
    <rect x="367" y="330" width="16" height="16" rx="3" />
  </g>

  <rect x="145" y="115" width="210" height="270" rx="12" ry="12" fill="#E6E9EB" />

  <g clip-path="url(#screen-clip)">
    <g transform="translate(0, 45)">
      <line x1="218" y1="185" x2="203" y2="160" stroke="#3DDC84" stroke-width="6" stroke-linecap="round" />
      <line x1="282" y1="185" x2="297" y2="160" stroke="#3DDC84" stroke-width="6" stroke-linecap="round" />
      
      <path d="M190,230 A60,60 0 0,1 310,230 Z" fill="#3DDC84" />
      
      <circle cx="223" cy="205" r="5.5" fill="#FFFFFF" />
      <circle cx="277" cy="205" r="5.5" fill="#FFFFFF" />
      
      <rect x="190" y="235" width="120" height="130" rx="4" ry="4" fill="#3DDC84" />
    </g>
  </g>

  <g transform="translate(340, 340)" filter="url(#play-shadow)">
    <circle cx="0" cy="0" r="56" fill="#F2F4F5" />
    
    <circle cx="0" cy="0" r="44" fill="#0F9D58" />
    
    <polygon points="-10,-18 -10,18 22,0" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" />
  </g>
</svg>
